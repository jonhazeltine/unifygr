# mirror-plan-codework.yml
#
# Reusable GitHub Actions workflow Mirror dispatches into each linked
# target repo. Triggered by start-plan-code-work edge function via the
# Mirror GitHub App.
#
# Inputs:
#   plan_id     — Mirror plan UUID, written into the PR description so
#                 the github-pr-webhook can correlate.
#   prompt      — the plan's "Claude builds" task list, plain text.
#   branch_name — mirror/plan/<slug>
#
# ANTHROPIC_API_KEY: fetched at runtime from Mirror's secrets broker
# using the workflow's GitHub OIDC token. Keeps the key out of every
# repo's Action secrets — set it once in Mirror's Supabase, works
# across every linked repo automatically.

name: Mirror — Plan Code Work

on:
  workflow_dispatch:
    inputs:
      plan_id:
        description: "Mirror plan UUID"
        required: true
      prompt:
        description: "What Claude should build (from the plan's claude_tasks)"
        required: true
      branch_name:
        description: "Branch to push commits to (mirror/plan/<slug>)"
        required: true

concurrency:
  group: mirror-codework-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write   # required to mint a GitHub OIDC token

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch
        run: |
          git config user.email "mirror-bot@users.noreply.github.com"
          git config user.name  "Mirror Bot"
          git checkout -b "${{ inputs.branch_name }}"

      - name: Fetch ANTHROPIC_API_KEY from Mirror
        id: mirror-secrets
        env:
          BROKER_URL: https://rioktqjdcwrnmvcmyoti.functions.supabase.co/mirror-secrets-broker
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -fsSL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=mirror-app" | jq -r .value)
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to mint GitHub OIDC token"
            exit 1
          fi
          RESPONSE=$(curl -fsSL -X POST "$BROKER_URL" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          KEY=$(echo "$RESPONSE" | jq -r '.ANTHROPIC_API_KEY // empty')
          if [ -z "$KEY" ]; then
            echo "::error::Mirror broker did not return ANTHROPIC_API_KEY. Response: $RESPONSE"
            exit 1
          fi
          # Mask in logs and export to env for the next step.
          echo "::add-mask::$KEY"
          echo "ANTHROPIC_API_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Run Claude Code
        # See https://github.com/anthropics/claude-code-action
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ inputs.prompt }}
          allowed_bots: "*"
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}

      - name: Push branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin "${{ inputs.branch_name }}"

      - name: Open draft PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --draft \
            --title "Mirror plan ${{ inputs.plan_id }}: $(echo "${{ inputs.prompt }}" | head -1 | head -c 60)" \
            --body "$(printf 'mirror-plan-id: %s\n\nThis PR was opened automatically by the Mirror Plans Code Work workflow. The locked plan and Claude/User split live in Mirror.\n' "${{ inputs.plan_id }}")" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ inputs.branch_name }}" \
          || echo "PR creation failed (may already exist)"
